<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Payment Checkout</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-content: center;
            height: 100vh;
            width: 100vw;
            background-color: #f6f9fc;
        }
        
        .container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 6px 9px rgba(50, 50, 93, 0.06), 0 2px 5px rgba(0, 0, 0, 0.08);
            padding: 40px;
            margin: auto;
            max-width: 400px;
            width: 100%;
        }
        
        h1 {
            color: #32325d;
            font-size: 24px;
            font-weight: 400;
            line-height: 30px;
            margin: 0 0 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            color: #6b7c93;
            font-weight: 300;
            letter-spacing: 0.025em;
            margin-bottom: 8px;
            display: block;
        }
        
        input[type="email"], input[type="number"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            outline: none;
            border-style: solid;
            border-width: 1px;
            border-color: #d1d1d1;
            border-radius: 4px;
            padding: 10px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        
        input[type="email"]:focus, input[type="number"]:focus {
            border-color: #635bff;
            box-shadow: 0 1px 3px 0 #cfd7df;
        }
        
        #card-element {
            border: 1px solid #d1d1d1;
            border-radius: 4px;
            padding: 10px;
        }
        
        #card-errors {
            color: #fa755a;
            margin-top: 8px;
        }
        
        .submit-button {
            background: #635bff;
            border-radius: 4px;
            border: 0;
            color: white;
            cursor: pointer;
            display: block;
            font-size: 16px;
            font-weight: 600;
            margin: 20px 0 0;
            padding: 12px 16px;
            width: 100%;
        }
        
        .submit-button:hover {
            background: #564ec7;
        }
        
        .submit-button:disabled {
            background: #aab7c4;
            cursor: default;
        }
        
        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #635bff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .success-message {
            color: #00d924;
            text-align: center;
            margin-top: 20px;
        }
        
        .error-message {
            color: #fa755a;
            text-align: center;
            margin-top: 20px;
        }
        
        .subscription-plans {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .plan-option {
            position: relative;
        }
        
        .plan-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }
        
        .plan-label {
            display: block;
            padding: 20px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff;
        }
        
        .plan-label:hover {
            border-color: #635bff;
            box-shadow: 0 2px 8px rgba(99, 91, 255, 0.1);
        }
        
        .plan-option input[type="radio"]:checked + .plan-label {
            border-color: #635bff;
            background: #f8f9ff;
            box-shadow: 0 2px 8px rgba(99, 91, 255, 0.15);
        }
        
        .plan-name {
            font-size: 18px;
            font-weight: 600;
            color: #32325d;
            margin-bottom: 8px;
        }
        
        .plan-price {
            font-size: 24px;
            font-weight: 700;
            color: #635bff;
            margin-bottom: 8px;
        }
        
        .plan-description {
            font-size: 14px;
            color: #6b7c93;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Choose your subscription plan</h1>
        
        <form id="payment-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label>Select Subscription Plan</label>
                <div class="subscription-plans">
                    <div th:each="subType : ${subscriptionTypes}" class="plan-option">
                        <input type="radio" th:id="'plan-' + ${subType.name()}" 
                               name="subscriptionType" th:value="${subType.name()}" required>
                        <label th:for="'plan-' + ${subType.name()}" class="plan-label">
                            <div class="plan-name" th:text="${subType.displayName}">Plan Name</div>
                            <div class="plan-price">$<span th:text="${subType.price}">0.00</span>/month</div>
                            <div class="plan-description" th:text="${subType.description}">Description</div>
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="card-element">Card Information</label>
                <div id="card-element">
                    <!-- Stripe Elements will create form elements here -->
                </div>
                <div id="card-errors" role="alert"></div>
            </div>
            
            <button id="submit-button" class="submit-button">
                <span id="button-text">Pay Now</span>
            </button>
        </form>
        
        <div id="payment-result"></div>
    </div>

    <script th:inline="javascript">
        // Get Stripe publishable key from Thymeleaf
        const stripePublishableKey = /*[[${stripePublishableKey}]]*/ 'pk_test_default';
        
        const stripe = Stripe(stripePublishableKey);
        const elements = stripe.elements();

        // Create card element
        const cardElement = elements.create('card', {
            style: {
                base: {
                    fontSize: '16px',
                    color: '#424770',
                    '::placeholder': {
                        color: '#aab7c4',
                    },
                },
                invalid: {
                    color: '#9e2146',
                },
            },
        });

        cardElement.mount('#card-element');

        // Handle real-time validation errors from the card Element
        cardElement.on('change', ({error}) => {
            const displayError = document.getElementById('card-errors');
            if (error) {
                displayError.textContent = error.message;
            } else {
                displayError.textContent = '';
            }
        });

        // Handle form submission
        const form = document.getElementById('payment-form');
        const submitButton = document.getElementById('submit-button');
        const buttonText = document.getElementById('button-text');
        const paymentResult = document.getElementById('payment-result');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const subscriptionType = document.querySelector('input[name="subscriptionType"]:checked');

            if (!email || !subscriptionType) {
                showError('Please fill in all fields and select a subscription plan');
                return;
            }

            setLoading(true);

            try {
                // Create payment intent
                const response = await fetch('/create-payment-intent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        email: email,
                        subscriptionType: subscriptionType.value
                    })
                });

                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    setLoading(false);
                    return;
                }

                // Confirm payment with Stripe
                const {error} = await stripe.confirmCardPayment(data.clientSecret, {
                    payment_method: {
                        card: cardElement,
                        billing_details: {
                            email: email,
                        },
                    }
                });

                if (error) {
                    showError(error.message);
                } else {
                    showSuccess('Payment succeeded! Your subscription is now active.');
                }
            } catch (error) {
                showError('An unexpected error occurred.');
            }

            setLoading(false);
        });

        function setLoading(isLoading) {
            if (isLoading) {
                submitButton.disabled = true;
                buttonText.innerHTML = '<span class="spinner"></span>Processing...';
            } else {
                submitButton.disabled = false;
                buttonText.textContent = 'Pay Now';
            }
        }

        function showError(message) {
            paymentResult.innerHTML = `<div class="error-message">${message}</div>`;
        }

        function showSuccess(message) {
            paymentResult.innerHTML = `<div class="success-message">${message}</div>`;
            form.style.display = 'none';
        }
    </script>
</body>
</html>
